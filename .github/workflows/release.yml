name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            artifact: engine_server-mac-arm64
          - os: macos-13
            artifact: engine_server-mac-x86_64
          - os: ubuntu-latest
            artifact: engine_server-linux-x86_64
          - os: windows-latest
            artifact: engine_server-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S matching_engine -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build engine_server
        run: cmake --build build --target engine_server --parallel

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv build/engine_server ${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv build/Release/engine_server.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --generate-notes \
            engine_server-mac-arm64 \
            engine_server-mac-x86_64 \
            engine_server-linux-x86_64 \
            engine_server-windows-x64.exe
